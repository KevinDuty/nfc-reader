<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accès bloqué</title>

<script>
// ⚙️ CONFIG
const BAN_INITIAL_MS = 7 * 24 * 60 * 60 * 1000;
const BAN_PENALTY_MS = 365 * 24 * 60 * 60 * 1000;

// Ne jamais bannir un admin
if (localStorage.getItem("is_admin") === "true") {
  localStorage.removeItem("ban_until");
}

// Si on arrive ici depuis une autre page → pénalité
(function() {
  if (localStorage.getItem("is_admin") === "true") return;

  const ref = document.referrer || "";
  if (!ref.includes("ban.html")) {
    const currentBan = Number(localStorage.getItem("ban_until")) || Date.now();
    const newBan = currentBan + BAN_PENALTY_MS;
    localStorage.setItem("ban_until", newBan);
  }
})();
</script>

<style>
/* 🔥 STYLE IDENTIQUE À index.html mais version rouge */
:root {
  --bg: #050816;
  --card: rgba(24, 0, 0, 0.85);
  --accent: #f87171;
  --text-main: #ffe4e6;
  --text-muted: #fca5a5;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui, sans-serif;
  background: radial-gradient(circle at top, #7f1d1d 0, #050816 55%, #000 100%);
  color: var(--text-main);
  display: flex;
  align-items: center;
  justify-content: center;
}

.container { width: 100%; max-width: 420px; padding: 24px; }

.card {
  background: var(--card);
  border-radius: 24px;
  padding: 24px;
  backdrop-filter: blur(18px);
  border: 1px solid rgba(248,113,113,0.4);
  box-shadow: 0 0 40px rgba(127,29,29,0.9), 0 0 80px rgba(248,113,113,0.35);
}

.title { font-size: 24px; font-weight: 700; display: flex; gap: 8px; }
.title span.icon { font-size: 26px; }

.subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

#banInfo {
  font-size: 15px;
  margin-bottom: 14px;
  color: #fecaca;
}

.btn {
  width: 100%;
  padding: 12px;
  border-radius: 999px;
  border: none;
  margin-top: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

.btn-ghost {
  background: rgba(24,0,0,0.9);
  color: #fecaca;
  border: 1px solid rgba(248,113,113,0.5);
}
</style>
</head>
<body>

<div class="container">
  <div class="card">

    <div class="title"><span class="icon">🚫</span><span>Accès bloqué</span></div>
    <div class="subtitle">Cet appareil est actuellement banni.</div>

    <div id="banInfo">Calcul du temps restant…</div>

    <button class="btn btn-ghost" onclick="window.location.href='ban.html'">Actualiser</button>

  </div>
</div>

<script>
(function() {
  const ban = localStorage.getItem("ban_until");
  const el = document.getElementById("banInfo");

  if (!ban) return el.textContent = "Aucun ban enregistré.";

  const reste = Number(ban) - Date.now();
  if (reste <= 0) return el.textContent = "Le ban est terminé. Recharge la page.";

  const j = Math.floor(reste / 86400000);
  const h = Math.floor((reste / 3600000) % 24);
  const m = Math.floor((reste / 60000) % 60);

  el.textContent = `Temps restant : ${j}j ${h}h ${m}m`;
})();
</script>

</body>
</html>
