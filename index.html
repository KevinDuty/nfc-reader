<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accès NFC</title>

<script>
// ⚙️ CONFIG GLOBALE
const ADMIN_KEY = "nfcreader_SUPERADMIN";
const BAN_INITIAL_MS = 7 * 24 * 60 * 60 * 1000;
const BAN_PENALTY_MS = 365 * 24 * 60 * 60 * 1000;

// --- INIT DEVICE + BAN CHECK ---
(function() {

  // Ne jamais bannir un admin
  if (localStorage.getItem("is_admin") === "true") {
    localStorage.removeItem("ban_until");
  }

  if (!localStorage.getItem("device_id")) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let id = "";
    for (let i = 0; i < 20; i++) id += chars[Math.floor(Math.random()*chars.length)];
    localStorage.setItem("device_id", "device_" + id);
  }

  const ban = localStorage.getItem("ban_until");
  if (ban && Number(ban) > Date.now() && localStorage.getItem("is_admin") !== "true") {
    window.location.href = "ban.html";
  }
})();
</script>

<style>
/* 🔥 STYLE IDENTIQUE POUR TOUTES LES PAGES */
:root {
  --bg: #050816;
  --card: rgba(15, 23, 42, 0.85);
  --accent: #22d3ee;
  --accent-soft: rgba(34, 211, 238, 0.2);
  --danger: #f97373;
  --text-main: #e5e7eb;
  --text-muted: #9ca3af;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #1d2b64 0, #050816 55%, #000 100%);
  color: var(--text-main);
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 24px;
}

.card {
  background: var(--card);
  border-radius: 24px;
  padding: 24px 20px 20px;
  box-shadow:
    0 0 40px rgba(15, 23, 42, 0.9),
    0 0 80px rgba(34, 211, 238, 0.25);
  border: 1px solid rgba(148, 163, 184, 0.25);
  backdrop-filter: blur(18px);
}

.title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.title span.icon {
  font-size: 26px;
}

.subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

label {
  display: block;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid rgba(148, 163, 184, 0.5);
  background: rgba(15, 23, 42, 0.8);
  color: var(--text-main);
  font-size: 14px;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.4);
}

.btn {
  width: 100%;
  padding: 12px 14px;
  border-radius: 999px;
  border: none;
  margin-top: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: 0.18s;
}

.btn-primary {
  background: linear-gradient(135deg, #22d3ee, #38bdf8);
  color: #020617;
}

.btn-ghost {
  background: rgba(15, 23, 42, 0.9);
  color: var(--text-main);
  border: 1px solid rgba(148, 163, 184, 0.5);
}

.section {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px dashed rgba(148, 163, 184, 0.4);
}

.time-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(15, 23, 42, 0.9);
  border: 1px solid rgba(148, 163, 184, 0.5);
  font-size: 13px;
}

.time-pill span.icon {
  color: var(--accent);
}

#status {
  margin-top: 10px;
  font-size: 13px;
  color: var(--danger);
  min-height: 16px;
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="title">
      <span class="icon">🔐</span>
      <span>Accès NFC</span>
    </div>
    <div class="subtitle">
      Entre ta clé d’accès ou utilise la clé admin.
    </div>

    <label>Clé d’accès</label>
    <input id="keyInput" placeholder="nfcreader_XXXX">
    <button class="btn btn-primary" onclick="validerCle()">Continuer</button>

    <div class="section">
      <div class="section-title">Abonnement</div>
      <div class="time-pill">
        <span class="icon">⏳</span>
        <span id="timeLeft">Aucune clé</span>
      </div>

      <button class="btn btn-ghost" onclick="window.location.href='buy.html'">
        Acheter une clé
      </button>
    </div>

    <div id="status"></div>
  </div>
</div>

<script>
function afficherTemps() {
  const exp = localStorage.getItem("nfc_exp");
  const el = document.getElementById("timeLeft");

  if (!exp) return el.textContent = "Aucune clé";
  if (exp === "life") return el.textContent = "À vie";

  const reste = Number(exp) - Date.now();
  if (reste <= 0) return el.textContent = "Expirée";

  const j = Math.floor(reste / 86400000);
  const h = Math.floor((reste / 3600000) % 24);
  const m = Math.floor((reste / 60000) % 60);

  el.textContent = `${j}j ${h}h ${m}m`;
}
afficherTemps();

function validerCle() {
  const input = document.getElementById("keyInput").value.trim();
  const key = localStorage.getItem("nfc_key");
  const exp = localStorage.getItem("nfc_exp");
  const status = document.getElementById("status");

  if (input === ADMIN_KEY) {
    localStorage.setItem("is_admin", "true");
    localStorage.removeItem("ban_until");
    return window.location.href = "nfc.html";
  }

  if (!key) return status.textContent = "❌ Aucune clé enregistrée.";
  if (input !== key) return status.textContent = "❌ Clé incorrecte.";
  if (exp !== "life" && Date.now() > Number(exp)) return status.textContent = "❌ Clé expirée.";

  localStorage.setItem("is_admin", "false");
  window.location.href = "nfc.html";
}
</script>

</body>
</html>
