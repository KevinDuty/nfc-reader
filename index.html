<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accès NFC</title>

<script>
// --- INIT DEVICE + BAN CHECK ---
(function() {
  // Device ID
  if (!localStorage.getItem("device_id")) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let id = "";
    for (let i = 0; i < 20; i++) id += chars[Math.floor(Math.random()*chars.length)];
    localStorage.setItem("device_id", "device_" + id);
  }

  // Ban check
  const ban = localStorage.getItem("ban_until");
  if (ban && Number(ban) > Date.now()) {
    window.location.href = "ban.html";
  }
})();
</script>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0a0f24, #001a33);
  color: white;
  text-align: center;
}
.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}
h1 { text-shadow: 0 0 10px cyan; }
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}
.btn {
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: rgba(0,255,255,0.15);
  color: cyan;
  box-shadow: 0 0 10px cyan;
}
</style>
</head>
<body>

<div class="container">
  <h1>🔐 Accès NFC</h1>

  <p>Entre ta clé d’accès :</p>
  <input id="keyInput" placeholder="nfcreader_XXXX">

  <button class="btn" onclick="validerCle()">Continuer</button>

  <h3>⏳ Temps restant :</h3>
  <p id="timeLeft">—</p>

  <button class="btn" onclick="window.location.href='buy.html'">
    Acheter une clé
  </button>

  <p id="status"></p>
</div>

<script>
const ADMIN_KEY = "nfcreader_ADMINMASTER";

function afficherTemps() {
  const exp = localStorage.getItem("nfc_exp");
  if (!exp) {
    document.getElementById("timeLeft").textContent = "Aucune clé";
    return;
  }

  if (exp === "life") {
    document.getElementById("timeLeft").textContent = "À vie";
    return;
  }

  const reste = Number(exp) - Date.now();
  if (reste <= 0) {
    document.getElementById("timeLeft").textContent = "Expirée";
    return;
  }

  const jours = Math.floor(reste / (1000*60*60*24));
  const heures = Math.floor((reste / (1000*60*60)) % 24);
  const minutes = Math.floor((reste / (1000*60)) % 60);

  document.getElementById("timeLeft").textContent =
    `${jours}j ${heures}h ${minutes}m`;
}

afficherTemps();

function validerCle() {
  const input = document.getElementById("keyInput").value.trim();
  const key = localStorage.getItem("nfc_key");
  const exp = localStorage.getItem("nfc_exp");

  // Admin direct
  if (input === ADMIN_KEY) {
    localStorage.setItem("is_admin", "true");
    window.location.href = "nfc.html";
    return;
  }

  if (!key) {
    document.getElementById("status").textContent = "❌ Aucune clé enregistrée.";
    return;
  }

  if (input !== key) {
    document.getElementById("status").textContent = "❌ Clé incorrecte.";
    return;
  }

  if (exp !== "life" && Date.now() > Number(exp)) {
    document.getElementById("status").textContent = "❌ Clé expirée.";
    return;
  }

  localStorage.setItem("is_admin", "false");
  window.location.href = "nfc.html";
}
</script>

</body>
</html>
