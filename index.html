<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>NFC Offline App</title>
</head>
<body>

<h1>NFC Offline App</h1>
<p>Fonctionne hors‑ligne grâce au Service Worker.</p>

<button onclick="lire()">📡 Lire</button>
<button onclick="ecrire()">✨ Écrire</button>
<button onclick="mettreMDP()">🔐 Mettre un mot de passe</button>
<button onclick="supprimerCle()">🗑️ Supprimer la clé</button>
<button onclick="enleverMDP()">🔓 Enlever le mot de passe</button>

<p id="status">En attente…</p>

<script>
// --- NFC FUNCTIONS ---
function lire() {
  document.getElementById("status").textContent = "Lecture NFC…";
}

function ecrire() {
  document.getElementById("status").textContent = "Écriture NFC…";
}

function mettreMDP() {
  document.getElementById("status").textContent = "Définition du mot de passe…";
}

function supprimerCle() {
  document.getElementById("status").textContent = "Suppression de la clé…";
}

function enleverMDP() {
  document.getElementById("status").textContent = "Retrait du mot de passe…";
}

// --- SERVICE WORKER ---
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker OK"))
    .catch(err => console.log("Erreur SW", err));
}
</script>

</body>
</html>
