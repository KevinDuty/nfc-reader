<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC Reader</title>

<script>
// ⚙️ CONFIG
const ADMIN_KEY = "nfcreader_SUPERADMIN";

// Ne jamais bannir un admin
if (localStorage.getItem("is_admin") === "true") {
  localStorage.removeItem("ban_until");
}

// IMPORTANT : on NE bloque PAS l’accès à nfc.html
// Sinon le NFC ne se lance jamais
</script>

<style>
/* 🔥 STYLE IDENTIQUE À index.html */
:root {
  --bg: #050816;
  --card: rgba(15, 23, 42, 0.85);
  --accent: #22d3ee;
  --text-main: #e5e7eb;
  --text-muted: #9ca3af;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui, sans-serif;
  background: radial-gradient(circle at top, #1d2b64 0, #050816 55%, #000 100%);
  color: var(--text-main);
  display: flex;
  align-items: center;
  justify-content: center;
}

.container { width: 100%; max-width: 420px; padding: 24px; }

.card {
  background: var(--card);
  border-radius: 24px;
  padding: 24px;
  backdrop-filter: blur(18px);
  border: 1px solid rgba(148,163,184,0.25);
  box-shadow: 0 0 40px rgba(15,23,42,0.9), 0 0 80px rgba(34,211,238,0.25);
}

.title { font-size: 24px; font-weight: 700; display: flex; gap: 8px; }
.title span.icon { font-size: 26px; }

.subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(148,163,184,0.5);
  background: rgba(15,23,42,0.8);
  color: var(--text-main);
  margin-bottom: 10px;
}

.btn {
  width: 100%;
  padding: 12px;
  border-radius: 999px;
  border: none;
  margin-top: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

.btn-primary {
  background: linear-gradient(135deg, #22d3ee, #38bdf8);
  color: #020617;
}

.btn-ghost {
  background: rgba(15,23,42,0.9);
  color: var(--text-main);
  border: 1px solid rgba(148,163,184,0.5);
}

#status {
  margin-top: 10px;
  font-size: 13px;
  min-height: 18px;
  color: var(--accent);
}
</style>
</head>
<body>

<div class="container">
  <div class="card">

    <div class="title"><span class="icon">📡</span><span>NFC Reader</span></div>
    <div class="subtitle">Chrome Android + NFC activé obligatoire.</div>

    <input id="textToWrite" placeholder="Texte à écrire">
    <input id="urlToWrite" placeholder="URL à écrire (optionnel)">

    <button class="btn btn-primary" onclick="lire()">📡 Lire</button>
    <button class="btn btn-ghost" onclick="ecrireTexte()">✨ Écrire texte</button>
    <button class="btn btn-ghost" onclick="ecrireURL()">🔗 Écrire URL</button>
    <button class="btn btn-ghost" onclick="effacer()">🧹 Effacer</button>

    <div id="status">En attente…</div>

    <button class="btn btn-ghost" onclick="window.location.href='index.html'">⬅ Retour</button>

  </div>
</div>

<script>
function setStatus(msg, err=false) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.style.color = err ? "#f97373" : "#22d3ee";
}

function checkNFC() {
  if (!("NDEFReader" in window)) {
    setStatus("❌ Web NFC non supporté sur cet appareil.", true);
    return false;
  }
  return true;
}

async function lire() {
  if (!checkNFC()) return;

  try {
    const reader = new NDEFReader();
    await reader.scan();
    setStatus("Approche une étiquette…");

    reader.onreading = event => {
      let result = "";
      for (const record of event.message.records) {
        const text = new TextDecoder().decode(record.data);
        result += text + " ";
      }
      setStatus(result || "Aucune donnée.");
    };
  } catch (err) {
    setStatus("Erreur : " + err, true);
  }
}

async function ecrireTexte() {
  if (!checkNFC()) return;

  const text = document.getElementById("textToWrite").value || "Hello NFC";

  try {
    const writer = new NDEFReader();
    await writer.write({ records: [{ recordType: "text", data: text }] });
    setStatus("Texte écrit !");
  } catch (err) {
    setStatus("Erreur : " + err, true);
  }
}

async function ecrireURL() {
  if (!checkNFC()) return;

  const url = document.getElementById("urlToWrite").value;
  if (!url) return setStatus("Entre une URL.", true);

  try {
    const writer = new NDEFReader();
    await writer.write({ records: [{ recordType: "url", data: url }] });
    setStatus("URL écrite !");
  } catch (err) {
    setStatus("Erreur : " + err, true);
  }
}

async function effacer() {
  if (!checkNFC()) return;

  try {
    const writer = new NDEFReader();
    await writer.write({ records: [{ recordType: "text", data: "" }] });
    setStatus("Étiquette effacée !");
  } catch (err) {
    setStatus("Erreur : " + err, true);
  }
}
</script>

</body>
</html>
