<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC Reader</title>

<script>
// ⚙️ CONFIG GLOBALE
const ADMIN_KEY = "nfcreader_SUPERADMIN";
const BAN_INITIAL_MS = 7 * 24 * 60 * 60 * 1000;
const BAN_PENALTY_MS = 365 * 24 * 60 * 60 * 1000;

// --- BAN + ACCÈS PROTÉGÉ ---
(function() {
  const ban = localStorage.getItem("ban_until");
  if (ban && Number(ban) > Date.now()) {
    window.location.href = "ban.html";
    return;
  }

  const key = localStorage.getItem("nfc_key");
  const exp = localStorage.getItem("nfc_exp");
  const isAdmin = localStorage.getItem("is_admin") === "true";

  if (!isAdmin) {
    if (!key) {
      const banTime = Date.now() + BAN_INITIAL_MS;
      localStorage.setItem("ban_until", banTime);
      window.location.href = "ban.html";
      return;
    }
    if (exp !== "life" && Date.now() > Number(exp)) {
      const banTime = Date.now() + BAN_INITIAL_MS;
      localStorage.setItem("ban_until", banTime);
      window.location.href = "ban.html";
      return;
    }
  }
})();
</script>

<style>
/* 🔥 STYLE IDENTIQUE À index.html */
:root {
  --bg: #050816;
  --card: rgba(15, 23, 42, 0.85);
  --accent: #22d3ee;
  --accent-soft: rgba(34, 211, 238, 0.2);
  --danger: #f97373;
  --text-main: #e5e7eb;
  --text-muted: #9ca3af;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #1d2b64 0, #050816 55%, #000 100%);
  color: var(--text-main);
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 24px;
}

.card {
  background: var(--card);
  border-radius: 24px;
  padding: 24px 20px 20px;
  box-shadow:
    0 0 40px rgba(15, 23, 42, 0.9),
    0 0 80px rgba(34, 211, 238, 0.25);
  border: 1px solid rgba(148, 163, 184, 0.25);
  backdrop-filter: blur(18px);
}

.title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.title span.icon {
  font-size: 26px;
}

.subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid rgba(148, 163, 184, 0.5);
  background: rgba(15, 23, 42, 0.8);
  color: var(--text-main);
  font-size: 14px;
  outline: none;
  margin-bottom: 10px;
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.4);
}

.btn {
  width: 100%;
  padding: 12px 14px;
  border-radius: 999px;
  border: none;
  margin-top: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: 0.18s;
}

.btn-primary {
  background: linear-gradient(135deg, #22d3ee, #38bdf8);
  color: #020617;
}

.btn-ghost {
  background: rgba(15, 23, 42, 0.9);
  color: var(--text-main);
  border: 1px solid rgba(148, 163, 184, 0.5);
}

#status {
  margin-top: 10px;
  font-size: 13px;
  min-height: 18px;
  color: var(--accent);
}

#adminPanel {
  margin-top: 20px;
  padding: 16px;
  border-radius: 18px;
  background: rgba(34, 211, 238, 0.08);
  border: 1px solid rgba(34, 211, 238, 0.25);
  display: none;
}

#adminPanel h2 {
  font-size: 16px;
  margin-bottom: 10px;
}

#adminInfo {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="container">
  <div class="card">

    <div class="title">
      <span class="icon">📡</span>
      <span>NFC Reader</span>
    </div>

    <div class="subtitle">Chrome Android + NFC activé obligatoire.</div>

    <input id="textToWrite" placeholder="Texte à écrire">
    <input id="urlToWrite" placeholder="URL à écrire (optionnel)">

    <button class="btn btn-primary" onclick="lire()">📡 Lire</button>
    <button class="btn btn-ghost" onclick="ecrireTexte()">✨ Écrire texte</button>
    <button class="btn btn-ghost" onclick="ecrireURL()">🔗 Écrire URL</button>
    <button class="btn btn-ghost" onclick="effacer()">🧹 Effacer</button>

    <div id="status">En attente…</div>

    <button class="btn btn-ghost" onclick="window.location.href='index.html'">⬅ Retour</button>

    <!-- PANEL ADMIN -->
    <div id="adminPanel">
      <h2>👑 Admin</h2>
      <div id="adminInfo"></div>

      <button class="btn btn-ghost" onclick="extendSub(30)">+1 mois</button>
      <button class="btn btn-ghost" onclick="extendSub(365)">+1 an</button>
      <button class="btn btn-ghost" onclick="setLife()">Passer à vie</button>

      <button class="btn btn-ghost" onclick="banDevice()">Bannir</button>
      <button class="btn btn-ghost" onclick="clearBan()">Débannir</button>

      <button class="btn btn-ghost" onclick="resetAll()">Reset complet</button>
    </div>

  </div>
</div>

<script>
function setStatus(msg, err=false) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.style.color = err ? "#f97373" : "#22d3ee";
}

function checkNFC() {
  if (!("NDEFReader" in window)) {
    setStatus("❌ Web NFC non supporté.", true);
    return false;
  }
  return true;
}

// ADMIN PANEL
function refreshAdminInfo() {
  const info = document.getElementById("adminInfo");
  const key = localStorage.getItem("nfc_key");
  const exp = localStorage.getItem("nfc_exp");
  const ban = localStorage.getItem("ban_until");
  const device = localStorage.getItem("device_id");

  let expText = exp === "life" ? "À vie" : new Date(Number(exp)).toLocaleString();
  if (!exp) expText = "Aucune";

  let banText = "Pas banni";
  if (ban && Number(ban) > Date.now()) {
    banText = "Banni jusqu'au " + new Date(Number(ban)).toLocaleString();
  }

  info.innerHTML =
    "DeviceID : " + device + "<br>" +
    "Clé : " + (key || "aucune") + "<br>" +
    "Expiration : " + expText + "<br>" +
    "Ban : " + banText;
}

(function() {
  if (localStorage.getItem("is_admin") === "true") {
    document.getElementById("adminPanel").style.display = "block";
    refreshAdminInfo();
  }
})();

function clearBan() {
  localStorage.removeItem("ban_until");
  alert("Débanni.");
  refreshAdminInfo();
}

function extendSub(days) {
  let exp = localStorage.getItem("nfc_exp");
  if (!exp || exp === "life") exp = Date.now();
  else exp = Number(exp);

  const newExp = exp + days * 24 * 60 * 60 * 1000;
  localStorage.setItem("nfc_exp", newExp);
  alert("Abonnement prolongé.");
  refreshAdminInfo();
}

function setLife() {
  localStorage.setItem("nfc_exp", "life");
  alert("Abonnement à vie.");
  refreshAdminInfo();
}

function banDevice() {
  const banTime = Date.now() + BAN_INITIAL_MS;
  localStorage.setItem("ban_until", banTime);
  alert("Appareil banni.");
  refreshAdminInfo();
}

function resetAll() {
  localStorage.clear();
  alert("Reset complet.");
  location.reload();
}

// NFC FUNCTIONS
async function lire() {
  if (!checkNFC()) return;

  try {
    const reader = new NDEFReader();
    await reader.scan();
    setStatus("Approche une étiquette…");

    reader.onreading = event => {
      let result = "";
      for (const record of event.message.records) {
        const text = new TextDecoder().decode(record.data);
        result += text + " ";
      }
      setStatus(result || "Aucune donnée.");
    };
  } catch (err) {
    setStatus("Erreur : " + err, true);
  }
}

async function ecrireTexte() {
  if (!checkNFC()) return;

  const text = document.getElementById("textToWrite").value || "Hello NFC";

  try {
    const writer = new NDEFReader();
    await writer.write({ records: [{ recordType: "text", data: text }] });
    setStatus("Texte écrit.");
  } catch (err) {
    setStatus("Erreur : " + err, true);
  }
}

async function ecrireURL() {
  if (!checkNFC()) return;

  const url = document.getElementById("urlToWrite").value;
  if (!url) return setStatus("Entre une URL.", true);

  try {
    const writer = new NDEFReader();
    await writer.write({ records: [{ recordType: "url", data: url }] });
    setStatus("URL écrite.");
  } catch (err) {
    setStatus("Erreur : " + err, true);
  }
}

async function effacer() {
  if (!checkNFC()) return;

  try {
    const writer = new NDEFReader();
    await writer.write({ records: [{ recordType: "text", data: "" }] });
    setStatus("Étiquette effacée.");
  } catch (err) {
    setStatus("Erreur : " + err, true);
  }
}
</script>

</body>
</html>
