<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panneau Unban</title>

<script>
// ⚙️ CONFIG
const UNBAN_CODE = "TSI-UNBAN-999"; // 🔐 Change ce code si tu veux

// Empêcher accès sans code
(function() {
  const code = prompt("Code admin requis :");
  if (code !== UNBAN_CODE) {
    alert("Code incorrect.");
    window.location.href = "index.html";
  }
})();
</script>

<style>
/* 🔥 STYLE IDENTIQUE À index.html */
:root {
  --bg: #050816;
  --card: rgba(15, 23, 42, 0.85);
  --accent: #22d3ee;
  --danger: #f97373;
  --text-main: #e5e7eb;
  --text-muted: #9ca3af;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #1d2b64 0, #050816 55%, #000 100%);
  color: var(--text-main);
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 24px;
}

.card {
  background: var(--card);
  border-radius: 24px;
  padding: 24px 20px 20px;
  box-shadow:
    0 0 40px rgba(15, 23, 42, 0.9),
    0 0 80px rgba(34, 211, 238, 0.25);
  border: 1px solid rgba(148, 163, 184, 0.25);
  backdrop-filter: blur(18px);
}

.title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.title span.icon {
  font-size: 26px;
}

.subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid rgba(148, 163, 184, 0.5);
  background: rgba(15, 23, 42, 0.8);
  color: var(--text-main);
  font-size: 14px;
  outline: none;
  margin-bottom: 10px;
}

.btn {
  width: 100%;
  padding: 12px 14px;
  border-radius: 999px;
  border: none;
  margin-top: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: 0.18s;
}

.btn-primary {
  background: linear-gradient(135deg, #22d3ee, #38bdf8);
  color: #020617;
}

.btn-ghost {
  background: rgba(15, 23, 42, 0.9);
  color: var(--text-main);
  border: 1px solid rgba(148, 163, 184, 0.5);
}
</style>
</head>
<body>

<div class="container">
  <div class="card">

    <div class="title">
      <span class="icon">🔓</span>
      <span>Panneau Unban</span>
    </div>

    <div class="subtitle">Débannir un utilisateur ou tout le monde.</div>

    <label>DeviceID à débannir</label>
    <input id="deviceInput" placeholder="device_xxxxx">

    <button class="btn btn-primary" onclick="unbanOne()">Déban cet utilisateur</button>
    <button class="btn btn-ghost" onclick="unbanAll()">Déban tout le monde</button>

    <button class="btn btn-ghost" onclick="window.location.href='index.html'">⬅ Retour</button>

  </div>
</div>

<script>
function unbanOne() {
  const id = document.getElementById("deviceInput").value.trim();
  if (!id) return alert("Entre un DeviceID.");

  // Comme tout est local, on ne peut débannir que SOI-MÊME
  const myID = localStorage.getItem("device_id");

  if (id === myID) {
    localStorage.removeItem("ban_until");
    alert("Utilisateur débanni !");
  } else {
    alert("⚠️ Impossible : ce site est 100% local, tu ne peux débannir que ton propre appareil.");
  }
}

function unbanAll() {
  localStorage.removeItem("ban_until");
  alert("Tous les bans locaux ont été supprimés !");
}
</script>

</body>
</html>
