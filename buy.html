<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achat de clé</title>

<script>
// ⚙️ CONFIG
const ADMIN_KEY = "nfcreader_SUPERADMIN";
const BAN_INITIAL_MS = 7 * 24 * 60 * 60 * 1000;
const BAN_PENALTY_MS = 365 * 24 * 60 * 60 * 1000;

// Ne jamais bannir un admin
if (localStorage.getItem("is_admin") === "true") {
  localStorage.removeItem("ban_until");
}

// Ban check
(function() {
  const ban = localStorage.getItem("ban_until");
  if (ban && Number(ban) > Date.now() && localStorage.getItem("is_admin") !== "true") {
    window.location.href = "ban.html";
  }
})();
</script>

<style>
/* 🔥 STYLE IDENTIQUE À index.html */
:root {
  --bg: #050816;
  --card: rgba(15, 23, 42, 0.85);
  --accent: #22d3ee;
  --text-main: #e5e7eb;
  --text-muted: #9ca3af;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui, sans-serif;
  background: radial-gradient(circle at top, #1d2b64 0, #050816 55%, #000 100%);
  color: var(--text-main);
  display: flex;
  align-items: center;
  justify-content: center;
}

.container { width: 100%; max-width: 420px; padding: 24px; }

.card {
  background: var(--card);
  border-radius: 24px;
  padding: 24px;
  backdrop-filter: blur(18px);
  border: 1px solid rgba(148,163,184,0.25);
  box-shadow: 0 0 40px rgba(15,23,42,0.9), 0 0 80px rgba(34,211,238,0.25);
}

.title { font-size: 24px; font-weight: 700; display: flex; gap: 8px; }
.title span.icon { font-size: 26px; }

.subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

.offer {
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(148,163,184,0.4);
  padding: 16px;
  border-radius: 18px;
  margin-bottom: 14px;
}

.offer h3 { margin: 0; font-size: 18px; }
.offer p { margin: 4px 0 10px; font-size: 13px; color: var(--text-muted); }

.btn {
  width: 100%;
  padding: 12px;
  border-radius: 999px;
  border: none;
  margin-top: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

.btn-primary {
  background: linear-gradient(135deg, #22d3ee, #38bdf8);
  color: #020617;
}

.btn-ghost {
  background: rgba(15,23,42,0.9);
  color: var(--text-main);
  border: 1px solid rgba(148,163,184,0.5);
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(148,163,184,0.5);
  background: rgba(15,23,42,0.8);
  color: var(--text-main);
  margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="container">
  <div class="card">

    <div class="title"><span class="icon">🛒</span><span>Achat de clé</span></div>
    <div class="subtitle">Choisis une formule d’abonnement.</div>

    <div id="choix">
      <div class="offer">
        <h3>Simple — 3€</h3>
        <p>Accès 1 mois.</p>
        <button class="btn btn-primary" onclick="choisir('simple')">Choisir</button>
      </div>

      <div class="offer">
        <h3>Projet — 5€</h3>
        <p>Accès 1 an.</p>
        <button class="btn btn-primary" onclick="choisir('projet')">Choisir</button>
      </div>

      <div class="offer">
        <h3>Start‑Up — 15€</h3>
        <p>Accès à vie.</p>
        <button class="btn btn-primary" onclick="choisir('startup')">Choisir</button>
      </div>
    </div>

    <div id="paiement" style="display:none;">
      <div class="subtitle">Paiement simulé (n’importe quoi fonctionne)</div>

      <input id="cardNum" placeholder="Numéro de carte">
      <input id="cardDate" placeholder="MM/AA">
      <input id="cardCVC" placeholder="CVC">

      <button class="btn btn-primary" onclick="payer()">Valider</button>
      <button class="btn btn-ghost" onclick="annuler()">Annuler</button>
    </div>

    <button class="btn btn-ghost" onclick="window.location.href='index.html'">⬅ Retour</button>

    <div id="status"></div>

  </div>
</div>

<script>
let typeAbonnement = null;

function choisir(type) {
  typeAbonnement = type;
  document.getElementById("choix").style.display = "none";
  document.getElementById("paiement").style.display = "block";
}

function annuler() {
  document.getElementById("paiement").style.display = "none";
  document.getElementById("choix").style.display = "block";
}

function genererCle() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  let random = "";
  for (let i = 0; i < 12; i++) random += chars[Math.floor(Math.random()*chars.length)];
  return "nfcreader_" + random;
}

function payer() {
  const key = genererCle();
  let expiration;

  if (typeAbonnement === "simple") expiration = Date.now() + 30*24*60*60*1000;
  else if (typeAbonnement === "projet") expiration = Date.now() + 365*24*60*60*1000;
  else expiration = "life";

  localStorage.setItem("nfc_key", key);
  localStorage.setItem("nfc_exp", expiration);

  document.getElementById("status").innerHTML =
    "✅ Paiement validé !<br>Clé : <b>" + key + "</b>";

  document.getElementById("paiement").style.display = "none";
}
</script>

</body>
</html>
